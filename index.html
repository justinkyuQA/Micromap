<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MicroMap</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#000000">
</head>

<body>

<div class="container">

<h1>📍 MicroMap</h1>

</p>

</button>

<div id="results">

</div>

<div class="card">
<h3>💻 Lenovo Laptop</h3>
<p>IP: 192.168.1.22</p>
<p>Ports: 22</p>
</div>

<div class="card">
<h3>🖨 Printer</h3>
<p>IP: 192.168.1.55</p>
<p>Ports: 80</p>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
